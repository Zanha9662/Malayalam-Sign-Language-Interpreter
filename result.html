<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            font-family: 'Poppins', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            background-color: rgba(255,255,255,0.08);
            padding: 40px 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            font-size: 30px;
            margin-bottom: 20px;
        }
        img {
            width: 300px;
            border-radius: 15px;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background-color: rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            background-color: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prediction</h1>

        <!--  Malayalam Letter -->
        <p>{{ label }}</p>

        <!--  Uploaded Image -->
        <img src="/static/upload.jpg" alt="Uploaded Image">

        <br>

        <a href="/upload">Upload Another</a>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
